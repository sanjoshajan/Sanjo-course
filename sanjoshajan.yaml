apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-2048-sanjo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-2048-sanjo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-2048-sanjo
    spec:
      containers:
        - name: course
          image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/sanjo-course:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-2048-sanjo
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: app-2048-sanjo
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-2048-sanjo
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-2048-sanjo
                port:
                  number: 3001